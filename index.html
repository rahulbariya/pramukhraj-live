<!DOCTYPE html>
<html>
<head>
  <title>Under Maintenance</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 {
      color: #0b5ed7;
    }
    p {
      color: #555;
      font-size: 18px;
    }
    .company {
      margin-top: 20px;
      font-weight: bold;
      color: #222;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Website Under Maintenance</h1>
    <p>We are currently updating our website to serve you better.</p>
    <p>Please visit again soon.</p>

    <div class="company">
      IT Company / Pramukhraj Infotech
    </div>
  </div>

</body>
</html>
